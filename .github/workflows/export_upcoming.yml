# 「これから来そう（近日発売）」JSON を生成して data/upcoming.json にコミットする（読み取り専用・全ゲーム対象）
# 置き場所: .github/workflows/export_upcoming.yml
# 実行: Actions タブ →「export upcoming JSON」→ Run workflow
# 守る線: DBは読み取り専用（SELECTのみ）。書き込みは data/upcoming.json 1ファイルだけ・毎回上書き＝可逆。
#         跳ね予想はしない（P3結論）＝発売前の注目リストのみ。
name: export upcoming JSON

on:
  workflow_dispatch: {}
  # schedule:
  #   - cron: "23 6 * * *"   # 例：1日1回（発売前は動きが遅いので低頻度で十分）

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install "psycopg2-binary>=2.9"
      - name: Run export_upcoming (DB read-only / JSON書き出し)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # NEWS_DAYS: "30"
          # LIMIT: "200"
        run: python scripts/export_upcoming.py
      - name: Commit JSON（変更があるときだけ）
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/upcoming.json
          if git diff --cached --quiet; then echo "変更なし＝コミットしない"; exit 0; fi
          git commit -m "data: update upcoming.json"
          for i in 1 2 3; do
            if git push; then echo "push成功"; exit 0; fi
            echo "push失敗 → 取り込み直して再試行 ($i/3)"; git pull --rebase
          done
          echo "3回失敗。同時pushの衝突が続いている可能性 → ログ共有を"; exit 1
