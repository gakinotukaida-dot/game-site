name: Review sweep (focused)

on:
  workflow_dispatch:
    inputs:
      cap:
        description: "1回の観測上限（まず 200 でテスト → OKなら 30000）"
        default: "30000"
        required: false
      rate:
        description: "毎秒リクエスト数（ストアフロントは控えめに。詰まるなら下げる）"
        default: "8"
        required: false
  # ↓ テストで「挙動」と「パラメータ（全期間の総数か）」を確認してから、
  #    この schedule のコメントを外して毎日自動を有効化する。
  schedule:
    - cron: "0 21 * * *"   # 毎日 21:00 UTC（CCU巡回 18:00 とずらす）

jobs:
  review-sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - name: Focused review snapshot sweep
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # STEAM_API_KEY は不要（store の appreviews はキーなし・別系統）。
          REVIEW_CAP: ${{ github.event.inputs.cap || '30000' }}
          REVIEW_RATE: ${{ github.event.inputs.rate || '8' }}
          PYTHONUNBUFFERED: "1"
        run: |
          pip install psycopg2-binary --quiet
          python3 scripts/review_sweep.py
