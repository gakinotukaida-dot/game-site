# view02 v2 ランキング（A＋B1）を実行し、data/view02_rising.json を生成してコミットする
# 置き場所: .github/workflows/view02_rank_v2.yml
# 実行: Actions タブ →「view02 rank v2 (JSON出力)」→ Run workflow
#
# 守る線: DBは読み取り専用（SELECTのみ）。書き込みは「リポジトリ内の data/view02_rising.json 1ファイル」だけ。
#         独立ファイル・毎回上書き＝可逆（消しても他に影響しない）。
# 戻し方: このファイルを削除（または旧 view02_rank.yml に戻す）だけ。
#
# 修正点（2026-06-11）:
#   1. permissions: contents: write を明示（無いと push が 403 → exit 128）
#   2. git の user.name / user.email を設定（無いと commit が exit 128）
#   3. push衝突時は取り込み直して最大3回再試行（他ワークフローの同時pushに備える保険）
#   4. checkout@v6 / setup-python@v6 に版上げ（2026-06-16のNode24強制化対応・最新版はGitHub APIで確認済み）

name: view02 rank v2 (JSON出力)

on:
  workflow_dispatch: {}
  schedule:
    # 1日4回。収集(sweep :11 / now_ccu :17)の後、make_feed(:25)の前に view02_rising を更新。
    - cron: "18 1,7,13,19 * * *"

permissions:
  contents: write   # data/view02_rising.json をコミットするために必要（これが無いと exit 128）

jobs:
  rank:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install "psycopg2-binary>=2.9"

      - name: Run view02 v2 (DB read-only / JSON書き出し)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # Twitch鍵が無ければ B1 は自動スキップ・A単独で動く（コード側の設計どおり）
          TWITCH_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_CLIENT_SECRET: ${{ secrets.TWITCH_CLIENT_SECRET }}
          # === レビュー急増を「自分比(relative)」で有効化（D2・2026-07-06） ===
          # レビュー履歴は 2026-06-03 開始＝21日超に達したため解禁（休眠実装を relative へ切替）。
          # 目的：現行の +50 絶対値は過剰ラベル（注目上位の95%点灯）と実測確定 → 平常週ペース比で妥当割合に。
          # 値は「暫定の出発点」。diagnose_review_history.yml を BASELINE_DAYS_LIST:"14" で回して分布を見てから
          #   REV_REL_MULT / REV_ABS_FLOOR を微調整できる。戻すなら REV_SURGE_MODE を "abs" に（env だけ・可逆）。
          REV_SURGE_MODE: "relative"     # 自分比。今週増 ÷ 平常週ペース ≥ REV_REL_MULT かつ 今週増 ≥ REV_ABS_FLOOR
          REV_BASELINE_DAYS: "14"        # 平常窓（14=2週＝曜日効果を相殺／各ゲームに 14+7=21日 の履歴が要る）
          REV_REL_MULT: "3"              # 平常週ペースの何倍で「急増」とみなすか（暫定）
          REV_ABS_FLOOR: "15"            # 極小ゲームのノイズ除け・最低増加数（暫定）
          # OUT_PATH: "data/view02_rising.json"   # 既定のまま。変える場合のみ有効化
        run: python scripts/view02_rank_v2.py
        # ↑ スクリプトの置き場所が scripts/ でない場合はパスを直す（v1のymlに合わせた想定）

      - name: Commit JSON（変更があるときだけ）
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/view02_rising.json
          if git diff --cached --quiet; then
            echo "変更なし＝コミットしない"
            exit 0
          fi
          git commit -m "view02: update data/view02_rising.json"
          for i in 1 2 3; do
            if git push; then
              echo "push成功"
              exit 0
            fi
            echo "push失敗 → リモートを取り込み直して再試行 ($i/3)"
            git pull --rebase
          done
          echo "3回失敗。他ワークフローと衝突が続いている可能性 → ログを共有してください"
          exit 1
