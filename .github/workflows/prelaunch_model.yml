# 羽根予想モデルを自社実績から学習して data/prelaunch_model.json にコミット（読み取り専用・スコアカード）
# 置き場所: .github/workflows/prelaunch_model.yml
# 役割: 発売前シグナル→発売後の跳ね を較正したモデルにする。export_upcoming がこの JSON を読んで各作品の跳ね確率を出す。
# 守る線: DBは読み取り専用（SELECTのみ）。書き込みは data/prelaunch_model.json 1ファイルだけ・毎回上書き＝可逆。
#         リーク無し（as-of）。著作物なし（重み・命中率・件数のみ）。
name: prelaunch model (learn spike scorecard)

on:
  workflow_dispatch: {}
  schedule:
    # 1日2回 4:20 / 16:20 UTC（各 export_upcoming 4:45 / 16:45 の前）。バックフィルの進捗を当日中に2回取り込む
    # ＝web_views の重み活性化のラグを半日に短縮（加速）。モデルを更新→直後のエクスポートが最新の較正を使う。
    - cron: "20 4,16 * * *"

permissions:
  contents: write

jobs:
  learn:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install "psycopg2-binary>=2.9"
      - name: Learn prelaunch model (DB read-only / JSON書き出し)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # LOOKBACK_DAYS: "180"
          # OUTCOME_DAYS: "14"
          # HIT_THRESHOLD: "1000"
        run: python scripts/prelaunch_model.py
      - name: Commit JSON（変更があるときだけ）
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/prelaunch_model.json
          if git diff --cached --quiet; then echo "変更なし＝コミットしない"; exit 0; fi
          git commit -m "data: update prelaunch_model.json"
          for i in 1 2 3; do
            if git push; then echo "push成功"; exit 0; fi
            echo "push失敗 → 取り込み直して再試行 ($i/3)"; git pull --rebase
          done
          echo "3回失敗。同時pushの衝突が続いている可能性 → ログ共有を"; exit 1
