name: Steam collector (dense tier)

on:
  workflow_dispatch:
    inputs:
      n:
        description: "密ティアの上位件数（動作確認は 20 など。本番は既定の 300）"
        default: "300"
        required: false
      passes:
        description: "1発火あたりの観測回数（動作確認は 1 で素早く。本番は既定の 3）"
        default: "3"
        required: false
  # 密ティア（監視リスト ∪ 直近CCU上位N）の同接を高頻度で観測する。
  # GitHubの無料スケジュールは :00 が最も混雑して取りこぼされやすいため、
  # :07/:22/:37/:52（15分毎）に分散する。※それでも best-effort で発火漏れは残る。
  # 対策（A案）：発火漏れを完全には防げないので、1回の発火で PASSES 回観測して
  # 6時間窓に複数点を確保する。発火が全く無い窓は依然薄いまま＝部分改善（引継ぎ §4/§5）。
  # 真の等間隔保証は外部トリガー（B案・PAT外部預け）でのみ可能で、本番採否は別判断。
  schedule:
    - cron: "7,22,37,52 * * * *"

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - name: Dense-tier current players sweep
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}
          DENSE_N: ${{ github.event.inputs.n || '300' }}
          # A案の観測パス。schedule発火時は inputs が空になるため || で既定値にフォールバックする。
          # 既定 PASSES=3／INTERVAL_SEC=300（開始 0/5/10分）／MAX_RUNTIME_SEC=1080（timeout 20分に2分の安全マージン）。
          # 戻すとき＝ここの PASSES を 1 にするだけで改修前と完全に同一挙動（コードは触らない）。
          PASSES: ${{ github.event.inputs.passes || '3' }}
          INTERVAL_SEC: "300"
          MAX_RUNTIME_SEC: "1080"
          PYTHONUNBUFFERED: "1"
        run: |
          pip install psycopg2-binary --quiet
          python3 scripts/dense_sweep.py
