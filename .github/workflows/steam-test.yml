name: Steam collector (dense tier)

# A'案：1回の発火で長時間ループし、6時間窓に複数の観測点を確保する（p90 を設計どおり効かせる）。
# GitHub-hosted ランナーのジョブ実行上限は 6時間（360分・ハードリミット）。その内側で約5.7時間ループする。
# 外部トリガー（B案）と違い PAT を外部に預けないため、鍵を増やさず・隔離を崩さずに高頻度化できる。
# 発火漏れ対策：schedule を 2時間ごとにして発火機会を増やし、concurrency で多重起動を防ぐ
#   （実行中なら新しい発火は待機。長時間ジョブが1本でも走れば6時間ぶん埋まる＝漏れに強い）。
# すべて暫定。戻すとき＝yml のこのブロックの値を元（PASSES=1 等）に戻すだけ。コードは触らない。

on:
  workflow_dispatch:
    inputs:
      n:
        description: "密ティアの上位件数（動作確認は 20 など。本番は既定の 300）"
        default: "300"
        required: false
      passes:
        description: "観測回数（動作確認は 1〜2 で素早く。本番は既定の 18＝20分×約5.7h）"
        default: "18"
        required: false
  schedule:
    - cron: "13 */2 * * *"   # 2時間ごと。:00 は混雑するため :13 に分散（best-effort なので分は目安）

# 同じグループのジョブは同時に1本だけ。実行中に来た発火は待機させ、二重観測と無駄な課金を防ぐ。
concurrency:
  group: dense-collector
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 350        # GitHub上限360分の手前。コード側 MAX_RUNTIME_SEC が先に自発停止する。
    steps:
      - uses: actions/checkout@v6
      - name: Dense-tier current players sweep (long-running)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}
          DENSE_N: ${{ github.event.inputs.n || '300' }}
          # A'案の本番値。schedule発火時は inputs が空になるため || で既定値にフォールバックする。
          PASSES: ${{ github.event.inputs.passes || '18' }}   # 6時間窓に約18点（案イ）
          INTERVAL_SEC: "1200"                                 # 20分間隔（パス開始時刻基準の等間隔）
          MAX_RUNTIME_SEC: "20640"                             # 344分で自発停止（timeout350分・上限360分に余裕）
          REFRESH_TARGETS_EVERY: "6"                           # 6パス=2時間ごとにターゲット再算出（新顔取り込み）
          PYTHONUNBUFFERED: "1"
        run: |
          pip install psycopg2-binary --quiet
          python3 scripts/dense_sweep.py
