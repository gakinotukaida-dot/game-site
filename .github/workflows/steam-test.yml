name: Steam player count test

on:
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch and save current players (Counter-Strike 2)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          COUNT=$(curl -s "https://api.steampowered.com/ISteamUserStats/GetNumberOfCurrentPlayers/v1/?appid=730" | jq -r '.response.player_count')
          echo "取得した同時接続数: $COUNT 人"
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -c "CREATE TABLE IF NOT EXISTS player_counts (id BIGSERIAL PRIMARY KEY, appid INTEGER NOT NULL, player_count INTEGER NOT NULL, recorded_at TIMESTAMPTZ NOT NULL DEFAULT now());"
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -c "INSERT INTO player_counts (appid, player_count) VALUES (730, $COUNT);"
          echo "保存しました。これまでの記録件数:"
          psql "$DATABASE_URL" -t -c "SELECT count(*) FROM player_counts;"
          echo "直近の記録（時刻は日本時間):"
          psql "$DATABASE_URL" -c "SELECT appid, player_count, recorded_at AT TIME ZONE 'Asia/Tokyo' AS jst FROM player_counts ORDER BY recorded_at DESC LIMIT 5;"
