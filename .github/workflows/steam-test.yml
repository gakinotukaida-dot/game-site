name: Steam collector (watchlist hourly)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch current players for watchlist games
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}
        run: |
          set -uo pipefail
          APPIDS=$(psql "$DATABASE_URL" -t -A -c "SELECT appid FROM games WHERE status='watchlist' ORDER BY appid;")
          echo "監視リスト: $(echo "$APPIDS" | tr '\n' ' ')"
          OK=0
          for APPID in $APPIDS; do
            RESP=$(curl -s --max-time 15 "https://api.steampowered.com/ISteamUserStats/GetNumberOfCurrentPlayers/v1/?appid=${APPID}&key=${STEAM_API_KEY}")
            PC=$(echo "$RESP" | jq -r '.response.player_count // empty')
            if [[ "$PC" =~ ^[0-9]+$ ]]; then
              psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -c "INSERT INTO player_counts (appid, player_count) VALUES (${APPID}, ${PC});"
              psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -c "UPDATE games SET last_checked_at = now(), last_active_at = CASE WHEN ${PC} > 0 THEN now() ELSE last_active_at END WHERE appid = ${APPID};"
              echo "  appid ${APPID}: ${PC} 人"
              OK=$((OK+1))
            else
              echo "  appid ${APPID}: 取得失敗（スキップ）"
            fi
          done
          echo "保存できた件数: ${OK}"
          echo "直近の記録（日本時間）:"
          psql "$DATABASE_URL" -c "SELECT pc.appid, g.name, pc.player_count, pc.recorded_at AT TIME ZONE 'Asia/Tokyo' AS jst FROM player_counts pc JOIN games g ON g.appid = pc.appid ORDER BY pc.recorded_at DESC LIMIT 10;"
