# レビュー履歴の厚み点検を手動実行（読み取り専用・ログ出力のみ・コミットなし）
# 置き場所: .github/workflows/diagnose_review_history.yml
# 実行: GitHub の Actions タブ →「Diagnose review history (read-only)」→ Run workflow
# 出力: 実行ログに [1]〜[4] が表示される。リポジトリやDBは一切変更しない。
name: Diagnose review history (read-only)

on:
  workflow_dispatch: {}

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install "psycopg2-binary>=2.9"
      - name: Run review-history diagnostic (read-only; prints to log)
        env:
          # 他の read-only ワークフローと同じ Neon 接続のシークレットを指定すること。
          # 名前が DATABASE_URL でない場合は右辺 secrets.XXX を合わせる。
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # 必要なら暫定パラメータをここで上書き可（例）:
          # MIN_CURRENT: "100"
          # REL_N: "150"
          # BASELINE_DAYS_LIST: "28,21,14"
          # REL_MULT: "3"
          # ABS_FLOOR: "15"
        run: python scripts/diagnose_review_history.py
